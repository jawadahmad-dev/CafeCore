<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <span class="brand-main">NORDIC CRUMB</span>
      <span class="brand-badge">{{ userData?.role | titlecase }}</span>
    </div>

    <div class="user-profile">
      <div class="user-avatar">
        {{ userData?.name?.charAt(0)?.toUpperCase() || 'A' }}
      </div>
      <div class="user-info">
        <span class="user-name">{{ userData?.name || 'Administrator' }}</span>
        <span class="user-role">{{ userData?.role }}</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <!-- Dashboard -->
      <a routerLink="/admin" routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/>
          <rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
        </svg>
        Menu
      </a>
        <a routerLink="/admin/updatehome" routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <path d="M12 20H21"/>
  <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z"/>
</svg>
        Home
      </a>


     

      <div class="nav-section-label">GENERAL</div>

      <!-- Storefront -->
      <a routerLink="/" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Storefront
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log Out
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-content">
      <router-outlet />
    </div>
  </main>
</div>
