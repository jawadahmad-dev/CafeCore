<section class="section contact-section">
  <div class="container contact-grid">
    
    <!-- Contact Info & Minimalist Map -->
    <div class="contact-info-col">
      <span class="section-subtitle">Kontakt</span>
      <h2 class="section-title">Visit Us in the Neighborhood</h2>
      <p class="contact-lead">We are located on a quiet corner in the historic arts district.</p>
      
      <div class="contact-details">
        <a href="https://www.google.com/maps/search/?api=1&query=456+Sandgatan+Street,+Gothenburg,+Sweden" target="_blank" rel="noopener" class="detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="detail-icon">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>
          </svg>
          <span>456 Sandgatan Street, Gothenburg, SE</span>
        </a>
        <a href="tel:+15552345678" class="detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="detail-icon">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <span>+1 (555) 234-5678</span>
        </a>
        <a href="mailto:hello@nordiccrumb.com" class="detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="detail-icon">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="M22 7l-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
          <span>hello@nordiccrumb.com</span>
        </a>
      </div>
      
      <!-- Stunning, Minimalist Stylized Vector Map -->

        <div id="map"></div>
      
    </div>
    
    <!-- Contact Form Wrapper -->
    <div class="reservation-card-wrapper">
     
        <div class="reservation-form-container glass">
          <h3 class="form-title">Get in Touch</h3>
          <p class="form-sub">Have a question, feedback, or a special request? We'd love to hear from you.</p>

          <form (submit)="submitContact()">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="con-name">Name</label>
                <input type="text" id="con-name" [(ngModel)]="contactForm.name" name="name" required placeholder="Your full name" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label" for="con-email">Email Address</label>
                <input type="email" id="con-email" [(ngModel)]="contactForm.email" name="email" required placeholder="hello@example.com" class="form-control">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="con-title">Subject</label>
              <input type="text" id="con-title" [(ngModel)]="contactForm.subject" name="subject" required placeholder="e.g. Catering inquiry, feedback, allergy question..." class="form-control">
            </div>

            <div class="form-group">
              <label class="form-label" for="con-query">Message</label>
              <textarea id="con-query" [(ngModel)]="contactForm.message" name="message" required placeholder="Tell us how we can help..." class="form-control textarea" rows="5"></textarea>
            </div>

            <button  type="submit" class="btn btn-accent disabled:opacity-50 btn-submit">Send Message</button>
          </form>
        </div>
      
    </div>

  </div>
</section>
