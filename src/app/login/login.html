<div class="login-wrapper">
  <!-- Ambient glow decorations -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="login-card glass">
    <!-- Brand header -->
    <div class="brand-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 11s2.5-3.5 8-3.5 8 3.5 8 3.5-1 6-8 6-8-6-8-6z" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 9v4M12 7.5v5M17 9v4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="brand-name">Nordic Crumb</h1>
      <p class="brand-subtitle">Staff &amp; Admin Portal</p>
    </div>

    <!-- ── LOGIN VIEW ───────────────────────────────────────────── -->
    @if (view() === 'login') {
      <form (submit)="$event.preventDefault(); onLogin()" class="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input
            type="email"
            id="login-email"
            name="email"
            [(ngModel)]="email"
            class="form-control animate-focus"
            placeholder="you@nordiccrumb.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPass() ? 'text' : 'password'"
              id="login-password"
              name="password"
              [(ngModel)]="password"
              class="form-control animate-focus"
              placeholder="Enter password"
              required
              autocomplete="current-password"
            >
            <button
              type="button"
              class="toggle-pass"
              (click)="showPass.set(!showPass())"
              [attr.aria-label]="showPass() ? 'Hide password' : 'Show password'"
            >
              @if (showPass()) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-footer-row">
      
        </div>

        <button
          type="submit"
          class="btn btn-accent btn-login"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner"></span> Signing in…
          } @else {
            Sign In
          }
        </button>
      </form>
    }

   

    <!-- Back to storefront link -->
    <div class="login-footer">
      <a routerLink="/" class="back-link">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to storefront
      </a>
    </div>
  </div>
</div>
